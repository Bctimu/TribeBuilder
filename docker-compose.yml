version: '3.8'

services:
  # This service is for your Node.js backend application.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app # Mounts your local project folder into the container.
    ports:
      - "3000:3000" # Maps port 3000 on your machine to port 3000 in the container.
    depends_on:
      - db
    environment:
      # These environment variables will be available inside the app container.
      # You can use a .env file later for more secure credential management.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/postgres

  # This service is for the PostgreSQL database.
  db:
    image: postgres:15-alpine
    restart: always
    volumes:
      - db_data:/var/lib/postgresql/data # This volume persists your database data.
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432" # Maps the database port to your local machine.

volumes:
  db_data: # A named volume to store the database data.
